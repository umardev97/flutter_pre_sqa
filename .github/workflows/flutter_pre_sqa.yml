name: Flutter Pre-SQA

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  pre_sqa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable

      - name: Check Flutter version
        run: flutter --version

      - name: Get packages
        run: flutter pub get

      - name: Run Flutter Pre-SQA
        run: dart run flutter_pre_sqa ci --coverage --json --skip-build